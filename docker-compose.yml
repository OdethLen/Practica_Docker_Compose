services:
  # Servidor Web
  web:
    image: nginx:latest
    ports:
      - "9080:80"
    volumes:
      - ./html:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
    networks:
      - lemp-network

  # Lenguaje PHP (Usando nuestro Dockerfile)
  php:
    build: ./php
    volumes:
      - ./html:/var/www/html
      - ./logs/php:/var/log/php
    networks:
      - lemp-network

  # Base de Datos
  db:
    image: mariadb:latest
    environment:
      MYSQL_DATABASE: tec
      MYSQL_USER: tec
      MYSQL_PASSWORD: Tec123.
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - lemp-network

  # Administrador de BD
  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "9081:80"
    environment:
      PMA_HOST: db
      UPLOAD_LIMIT: 128M
    networks:
      - lemp-network

networks:
  lemp-network:
    driver: bridge

volumes:
  db_data: